<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistem Procurement ITK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
    .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); }
    .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); transition: all 0.3s ease; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.5); }
    .input-field { transition: all 0.3s ease; }
    .input-field:focus { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(102,126,234,0.3); }
    .float { animation: float 6s ease-in-out infinite; }
    .float2 { animation: float 8s ease-in-out infinite reverse; }
    @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
    .fade-in { animation: fadeIn 0.8s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center overflow-hidden relative">

  <div class="absolute top-20 left-20 w-32 h-32 rounded-full glass float opacity-50"></div>
  <div class="absolute bottom-20 right-20 w-48 h-48 rounded-full glass float2 opacity-30"></div>
  <div class="absolute top-1/2 left-10 w-20 h-20 rounded-full glass float opacity-40"></div>
  <div class="absolute top-10 right-1/3 w-16 h-16 rounded-full glass float2 opacity-50"></div>

  <div class="card rounded-3xl shadow-2xl p-10 w-full max-w-md mx-4 fade-in relative z-10">
    <div class="text-center mb-8">
      <div class="w-20 h-20 rounded-2xl mx-auto mb-4 flex items-center justify-center"
           style="background: linear-gradient(135deg, #667eea, #764ba2)">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">Sistem Procurement</h1>
      <p class="text-gray-500 mt-1 text-sm">Institut Teknologi Kalimantan</p>
    </div>

    <div class="mb-5">
      <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
      <input id="email" type="email" placeholder="email@itk.ac.id"
        class="input-field w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-400 text-gray-700">
    </div>

    <div class="mb-7">
      <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
      <input id="password" type="password" placeholder="••••••••"
        class="input-field w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-400 text-gray-700">
    </div>

    <button onclick="login()"
      class="btn-primary w-full text-white font-semibold py-3 rounded-xl text-lg">
      Masuk →
    </button>

    <p id="pesan" class="text-sm text-center mt-4 min-h-5"></p>

    <div class="mt-6 pt-6 border-t border-gray-100 text-center">
      <p class="text-xs text-gray-400">© 2026 ITK Balikpapan · Teknik Logistik</p>
    </div>
  </div>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://bgtgeltkbanlnvymalum.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJndGdlbHRrYmFubG52eW1hbHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTAwNDksImV4cCI6MjA5NTA4NjA0OX0.-JlapeQpug44SjkEKgb1wyoX2_ftdGGcAnTHJhdzvwE'
    )

    async function login() {
      const email = document.getElementById('email').value
      const pass = document.getElementById('password').value
      const pesan = document.getElementById('pesan')

      if (!email || !pass) {
        pesan.textContent = '⚠️ Email dan password wajib diisi!'
        pesan.className = 'text-red-500 text-sm text-center mt-4'
        return
      }

      pesan.textContent = '⏳ Memproses...'
      pesan.className = 'text-purple-500 text-sm text-center mt-4'

      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass })

      if (error) {
        pesan.textContent = '❌ Login gagal! ' + error.message
        pesan.className = 'text-red-500 text-sm text-center mt-4'
        return
      }

      const { data: profile } = await sb
        .from('profiles').select('role').eq('id', data.user.id).single()

      const role = profile?.role
      if (role === 'manajer') location.href = 'manajer.html'
      else if (role === 'staf_pengadaan') location.href = 'staf-pengadaan.html'
      else if (role === 'staf_keuangan') location.href = 'staf-keuangan.html'
      else if (role === 'supplier') location.href = 'supplier.html'
      else location.href = 'user.html'
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login() })
  </script>
</body>
</html>
