<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Manajer - Procurement ITK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .sidebar { background: linear-gradient(180deg, #064e3b 0%, #065f46 50%, #047857 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn-approve { background: linear-gradient(135deg, #10b981, #059669); transition: all 0.3s; }
    .btn-approve:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16,185,129,0.4); }
    .btn-reject { background: linear-gradient(135deg, #ef4444, #dc2626); transition: all 0.3s; }
    .btn-reject:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(239,68,68,0.4); }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- Sidebar -->
  <div class="sidebar w-64 min-h-screen flex flex-col fixed left-0 top-0 z-20">
    <div class="p-6 border-b border-white border-opacity-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-white bg-opacity-20 flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <div>
          <p class="text-white font-bold text-sm">Procurement ITK</p>
          <p class="text-green-300 text-xs">Dashboard Manajer</p>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-4">
      <p class="text-green-300 text-xs font-semibold uppercase tracking-wider mb-3 px-3">Menu</p>
      <a href="#" class="flex items-center gap-3 px-3 py-3 rounded-xl text-white bg-white bg-opacity-20 mb-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg>
        <span class="text-sm font-medium">Approval PR</span>
      </a>
    </nav>
    <div class="p-4 border-t border-white border-opacity-10">
      <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-red-300 hover:bg-red-500 hover:bg-opacity-20 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        <span class="text-sm font-medium">Logout</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="ml-64 flex-1 p-8">
    <div class="mb-8 fade-in">
      <h1 class="text-3xl font-bold text-gray-800">Dashboard Manajer</h1>
      <p class="text-gray-500 mt-1">Kelola persetujuan purchase request</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-6 mb-8 fade-in">
      <div class="bg-white rounded-2xl p-6 card-hover shadow-sm border-l-4 border-yellow-400">
        <p class="text-3xl font-bold text-gray-800" id="jmlMenunggu">-</p>
        <p class="text-gray-500 text-sm mt-1">Menunggu Approval</p>
      </div>
      <div class="bg-white rounded-2xl p-6 card-hover shadow-sm border-l-4 border-green-400">
        <p class="text-3xl font-bold text-gray-800" id="jmlDisetujui">-</p>
        <p class="text-gray-500 text-sm mt-1">Disetujui</p>
      </div>
      <div class="bg-white rounded-2xl p-6 card-hover shadow-sm border-l-4 border-red-400">
        <p class="text-3xl font-bold text-gray-800" id="jmlDitolak">-</p>
        <p class="text-gray-500 text-sm mt-1">Ditolak</p>
      </div>
    </div>

    <!-- List PR -->
    <div class="bg-white rounded-2xl shadow-sm p-8 fade-in">
      <h2 class="text-xl font-bold text-gray-800 mb-6">Purchase Request Menunggu Persetujuan</h2>
      <div id="listPR"><p class="text-gray-400 text-sm">Memuat data...</p></div>
    </div>
  </div>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://bgtgeltkbanlnvymalum.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJndGdlbHRrYmFubG52eW1hbHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTAwNDksImV4cCI6MjA5NTA4NjA0OX0.-JlapeQpug44SjkEKgb1wyoX2_ftdGGcAnTHJhdzvwE'
    )
    async function cekLogin() {
      const { data } = await sb.auth.getSession()
      if (!data.session) { window.location.href = 'index.html'; return }
      muatSemua()
    }
    async function muatSemua() {
      const { data: semua } = await sb.from('purchase_request').select('*')
      if (semua) {
        document.getElementById('jmlMenunggu').textContent = semua.filter(x => x.status === 'menunggu').length
        document.getElementById('jmlDisetujui').textContent = semua.filter(x => x.status === 'disetujui').length
        document.getElementById('jmlDitolak').textContent = semua.filter(x => x.status === 'ditolak').length
      }
      const { data } = await sb.from('purchase_request').select('*')
        .eq('status', 'menunggu').order('created_at', { ascending: false })
      const container = document.getElementById('listPR')
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="text-center py-12"><p class="text-gray-400">✅ Tidak ada PR yang menunggu persetujuan</p></div>'
        return
      }
      container.innerHTML = data.map(pr => `
        <div class="border-2 border-gray-100 rounded-2xl p-6 mb-4 hover:border-green-200 transition">
          <div class="flex justify-between items-start mb-4">
            <div>
              <p class="font-bold text-gray-800 text-lg">${pr.nama_barang}</p>
              <p class="text-gray-500 text-sm mt-1">Jumlah: <span class="font-semibold">${pr.jumlah} unit</span></p>
              <p class="text-gray-500 text-sm">Spesifikasi: ${pr.spesifikasi}</p>
              <p class="text-gray-400 text-xs mt-2">${new Date(pr.created_at).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'})}</p>
            </div>
            <span class="text-xs font-bold px-4 py-2 rounded-full bg-yellow-100 text-yellow-700">MENUNGGU</span>
          </div>
          <div class="flex gap-3">
            <button onclick="ubahStatus('${pr.id}', 'disetujui')"
              class="btn-approve text-white px-6 py-2 rounded-xl text-sm font-semibold">
              ✅ Setujui
            </button>
            <button onclick="ubahStatus('${pr.id}', 'ditolak')"
              class="btn-reject text-white px-6 py-2 rounded-xl text-sm font-semibold">
              ❌ Tolak
            </button>
          </div>
        </div>
      `).join('')
    }
    async function ubahStatus(id, status) {
      await sb.from('purchase_request').update({ status }).eq('id', id)
      muatSemua()
    }
    async function logout() {
      await sb.auth.signOut()
      window.location.href = 'index.html'
    }
    cekLogin()
  </script>
</body>
</html>
