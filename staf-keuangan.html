<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Staf Keuangan - Procurement ITK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .sidebar { background: linear-gradient(180deg, #7c2d12 0%, #9a3412 50%, #c2410c 100%); }
    .btn-primary { background: linear-gradient(135deg, #f97316, #ea580c); transition: all 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(249,115,22,0.4); }
    .btn-lunas { background: linear-gradient(135deg, #10b981, #059669); transition: all 0.3s; }
    .btn-lunas:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16,185,129,0.4); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- Sidebar -->
  <div class="sidebar w-64 min-h-screen flex flex-col fixed left-0 top-0 z-20">
    <div class="p-6 border-b border-white border-opacity-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-white bg-opacity-20 flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <p class="text-white font-bold text-sm">Procurement ITK</p>
          <p class="text-orange-300 text-xs">Staf Keuangan</p>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-4">
      <a href="#" class="flex items-center gap-3 px-3 py-3 rounded-xl text-white bg-white bg-opacity-20 mb-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z"/></svg>
        <span class="text-sm font-medium">Invoice</span>
      </a>
    </nav>
    <div class="p-4 border-t border-white border-opacity-10">
      <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-red-300 hover:bg-red-500 hover:bg-opacity-20 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        <span class="text-sm font-medium">Logout</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="ml-64 flex-1 p-8">
    <div class="mb-8 fade-in">
      <h1 class="text-3xl font-bold text-gray-800">Dashboard Staf Keuangan</h1>
      <p class="text-gray-500 mt-1">Kelola invoice dan pembayaran</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-6 mb-8 fade-in">
      <div class="bg-white rounded-2xl p-6 card-hover shadow-sm border-l-4 border-orange-400">
        <p class="text-3xl font-bold text-gray-800" id="jmlPO">-</p>
        <p class="text-gray-500 text-sm mt-1">Total Purchase Order</p>
      </div>
      <div class="bg-white rounded-2xl p-6 card-hover shadow-sm border-l-4 border-green-400">
        <p class="text-3xl font-bold text-gray-800" id="jmlLunas">-</p>
        <p class="text-gray-500 text-sm mt-1">Invoice Lunas</p>
      </div>
    </div>

    <!-- PO List -->
    <div class="bg-white rounded-2xl shadow-sm p-8 mb-6 fade-in">
      <h2 class="text-xl font-bold text-gray-800 mb-6">Purchase Order — Buat Invoice</h2>
      <div id="listPO"><p class="text-gray-400 text-sm">Memuat data...</p></div>
    </div>

    <!-- Invoice List -->
    <div class="bg-white rounded-2xl shadow-sm p-8 fade-in">
      <h2 class="text-xl font-bold text-gray-800 mb-6">Riwayat Invoice</h2>
      <div id="listInvoice"><p class="text-gray-400 text-sm">Memuat data...</p></div>
    </div>
  </div>

  <script>
    const { createClient } = supabase
    const sb = createClient(
      'https://bgtgeltkbanlnvymalum.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJndGdlbHRrYmFubG52eW1hbHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTAwNDksImV4cCI6MjA5NTA4NjA0OX0.-JlapeQpug44SjkEKgb1wyoX2_ftdGGcAnTHJhdzvwE'
    )
    async function cekLogin() {
      const { data } = await sb.auth.getSession()
      if (!data.session) { window.location.href = 'index.html'; return }
      muatPO(); muatInvoice()
    }
    async function muatPO() {
      const { data } = await sb.from('purchase_order').select('*').order('created_at', { ascending: false })
      document.getElementById('jmlPO').textContent = data ? data.length : 0
      const container = document.getElementById('listPO')
      if (!data || data.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-sm">Belum ada PO.</p>'
        return
      }
      container.innerHTML = data.map(po => `
        <div class="flex items-center justify-between p-4 border-2 border-gray-100 rounded-xl mb-3 hover:border-orange-200 transition">
          <div>
            <p class="font-semibold text-gray-800">${po.nama_supplier}</p>
            <p class="text-sm text-gray-500 mt-1">Rp ${parseInt(po.total_harga).toLocaleString('id-ID')} · Kirim: ${po.tgl_kirim}</p>
          </div>
          <button onclick="buatInvoice('${po.id}', ${po.total_harga}, '${po.nama_supplier}')"
            class="btn-primary text-white px-5 py-2 rounded-xl text-sm font-semibold">
            + Invoice
          </button>
        </div>
      `).join('')
    }
    async function muatInvoice() {
      const { data } = await sb.from('invoice').select('*').order('created_at', { ascending: false })
      document.getElementById('jmlLunas').textContent = data ? data.filter(x => x.status_bayar === 'lunas').length : 0
      const container = document.getElementById('listInvoice')
      if (!data || data.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-sm">Belum ada invoice.</p>'
        return
      }
      container.innerHTML = data.map(inv => `
        <div class="flex items-center justify-between p-4 border-2 border-gray-100 rounded-xl mb-3">
          <div>
            <p class="font-semibold text-gray-800">${inv.nama_supplier}</p>
            <p class="text-sm text-gray-500 mt-1">Rp ${parseInt(inv.jumlah_tagihan).toLocaleString('id-ID')} · ${new Date(inv.created_at).toLocaleDateString('id-ID')}</p>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold px-4 py-2 rounded-full ${inv.status_bayar === 'lunas' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
              ${inv.status_bayar.toUpperCase()}
            </span>
            ${inv.status_bayar !== 'lunas' ? `
              <button onclick="bayarInvoice('${inv.id}')" class="btn-lunas text-white px-4 py-2 rounded-xl text-xs font-semibold">
                Tandai Lunas
              </button>` : ''}
          </div>
        </div>
      `).join('')
    }
    async function buatInvoice(poId, totalHarga, namaSupplier) {
      const { error } = await sb.from('invoice').insert({
        po_id: poId, jumlah_tagihan: totalHarga,
        nama_supplier: namaSupplier, status_bayar: 'belum_lunas'
      })
      if (!error) { muatInvoice(); alert('✅ Invoice berhasil dibuat!') }
    }
    async function bayarInvoice(id) {
      await sb.from('invoice').update({ status_bayar: 'lunas' }).eq('id', id)
      muatInvoice()
    }
    async function logout() {
      await sb.auth.signOut()
      window.location.href = 'index.html'
    }
    cekLogin()
  </script>
</body>
</html>
